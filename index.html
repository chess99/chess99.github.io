<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cearl</title>
    <meta name="description" content="Cearl 的个人主页与导航索引。" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0d12;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.62);
        --border: rgba(255, 255, 255, 0.12);
        --link: #78a6ff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f8fb;
          --card: rgba(0, 0, 0, 0.04);
          --text: rgba(0, 0, 0, 0.92);
          --muted: rgba(0, 0, 0, 0.62);
          --border: rgba(0, 0, 0, 0.1);
          --link: #245cff;
        }
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 20% 10%, rgba(120, 166, 255, 0.35), transparent 60%),
          radial-gradient(1200px 600px at 80% 40%, rgba(255, 120, 200, 0.22), transparent 60%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }
      .wrap {
        width: min(820px, 100%);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      a.item {
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 14px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        transition: transform 0.12s ease, border-color 0.12s ease,
          background 0.12s ease;
      }
      a.item:hover {
        transform: translateY(-1px);
        border-color: rgba(120, 166, 255, 0.55);
        background: rgba(120, 166, 255, 0.08);
      }
      .item b {
        display: block;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .item span {
        display: block;
        font-size: 13px;
        color: var(--muted);
      }
      footer {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }
      footer a {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Cearl</h1>
        <p>个人主页（占位版）。后续会在这里实现更完整的入口索引与作品展示。</p>

        <div class="grid">
          <a class="item" href="/blog/">
            <b>博客</b>
            <span>文章与笔记（/blog）</span>
          </a>
          <a class="item" href="https://github.com/chess99" rel="noreferrer noopener" target="_blank">
            <b>GitHub</b>
            <span>@chess99</span>
          </a>
        </div>

        <footer>
          <span>Domain: <b>cearl.cc</b></span>
          <span> · </span>
          <a href="/robots.txt">robots</a>
        </footer>
      </div>
    </div>
  </body>
</html>
